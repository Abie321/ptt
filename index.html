<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasty Planet Fan Game - Prototype</title>
    <!-- Load Tailwind CSS and Google Fonts for Zesty Jelly theme -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700;800&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1f0040; /* Zesty Jelly background */
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            position: relative;
        }
        #game-container {
            position: relative;
            z-index: 10;
            border: 6px solid #120224; /* Thick comic stroke */
            border-radius: 2rem; /* rounded-lg */
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(18, 2, 36, 0.6);
        }
        .blob {
            position: absolute;
            filter: blur(50px);
            opacity: 0.35;
            border-radius: 50%;
            animation: wobble 10s ease-in-out infinite alternate;
            z-index: 1;
        }
        @keyframes wobble {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
            100% { transform: translate(-30px, 30px) scale(0.9); }
        }
    </style>
</head>
<body>
    <!-- Animated Ambient Blobs in Background -->
    <div class="blob bg-[#39ff14] w-[450px] h-[450px] top-[-100px] left-[-100px]"></div>
    <div class="blob bg-[#00daf3] w-[350px] h-[350px] bottom-[-50px] right-[-50px]" style="animation-delay: -2s;"></div>
    <div class="blob bg-[#ff7f1c] w-[250px] h-[250px] top-1/2 left-3/4" style="animation-delay: -4s;"></div>
    <div class="blob bg-[#45236b] w-[500px] h-[500px] bottom-1/2 left-1/3" style="animation-delay: -1s;"></div>

    <div id="game-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/levels/level1.js"></script>
    <script src="js/levels/level2.js"></script>
    <script src="js/levels/level3.js"></script>
    <script src="js/levels/level4.js"></script>
    <script src="js/levels/level5.js"></script>
    <script src="js/levels/level6.js"></script>
    <script src="js/entities/Player.js"></script>
    <script src="js/entities/EdibleItem.js"></script>
    <script src="js/entities/Hazard.js"></script>
    <script src="js/scenes/MainMenuScene.js"></script>
    <script src="js/scenes/WorldSelectScene.js"></script>
    <script src="js/scenes/LevelSelectScene.js"></script>
    <script src="js/scenes/LevelDetailScene.js"></script>
    <script src="js/scenes/LevelCreatorScene.js"></script>
    <script src="js/scenes/GameScene.js"></script>
    <script src="js/scenes/EndLevelScene.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
